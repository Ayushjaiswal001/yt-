name: YTAutoPilot — Auto Upload (FREE)
on:
  workflow_dispatch:
    inputs:
      topic:        {description: "Topic (blank=auto-trending)", required: false, type: string}
      niche:        {description: "Niche", required: false, default: "tech", type: string}
      upload_short: {description: "Upload Short?", required: false, default: "true", type: string}
  schedule:
    - cron: "30 3 * * 1,3,5"   # Mon/Wed/Fri 9AM IST

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: "pip"}
      - run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt

      - name: Auto-update trending topics
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOPICS_FILE: topics.json
        run: python update_topics.py --niche "${{ github.event.inputs.niche || 'tech' }}" --count 10

      - name: Commit updated topics
        env: {GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}
        run: |
          git config --global user.email "bot@ytautopilot.com"
          git config --global user.name "YTAutoPilot Bot"
          git add topics.json || true
          git diff --staged --quiet || git commit -m "auto: update topics $(date +%F)"
          git push || true

      - name: Generate + upload long video
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          YT_CREDENTIALS_JSON: ${{ secrets.YT_CREDENTIALS_JSON }}
          YT_CHANNEL_ID:       ${{ secrets.YT_CHANNEL_ID_TECH }}
          TTS_VOICE:           en-IN-NeerjaNeural
          TTS_RATE:            "+5%"
          OUTPUT_DIR:          ./output/long
        run: |
          TOPIC="${AUTO_TOPIC:-${{ github.event.inputs.topic }}}"
          NICHE="${AUTO_NICHE:-${{ github.event.inputs.niche || 'tech' }}}"
          python pipeline.py --topic "$TOPIC" --niche "$NICHE"

      - name: Generate + upload Short
        if: ${{ github.event.inputs.upload_short != 'false' }}
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          YT_CREDENTIALS_JSON: ${{ secrets.YT_CREDENTIALS_JSON }}
          YT_CHANNEL_ID:       ${{ secrets.YT_CHANNEL_ID_TECH }}
          TTS_RATE:            "+10%"
          OUTPUT_DIR:          ./output/shorts
        run: |
          TOPIC="${AUTO_TOPIC:-${{ github.event.inputs.topic }}}"
          python shorts_pipeline.py --topic "$TOPIC" --niche "tech"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: yt-tech-${{ github.run_id }}
          path: output/**/*.mp4
          retention-days: 3
