name: Academic Biohacker — Auto Upload
on:
  workflow_dispatch:
    inputs:
      topic:        {description: "Topic (blank=auto)", required: false, type: string}
      niche:        {description: "Niche", required: false, default: "health", type: string}
      upload_short: {description: "Upload Short?", required: false, default: "true", type: string}
  schedule:
    - cron: "30 3 * * 2,4,6"   # Tue/Thu/Sat 9AM IST

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: "pip"}
      - run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt

      - name: Auto-update health topics
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOPICS_FILE: biohacker_topics.json
        run: python update_topics.py --niche "health" --count 10

      - name: Commit topics
        env: {GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}
        run: |
          git config --global user.email "bot@ytautopilot.com"
          git config --global user.name "YTAutoPilot Bot"
          git add biohacker_topics.json || true
          git diff --staged --quiet || git commit -m "auto: biohacker topics $(date +%F)"
          git push || true

      - name: Long video
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          YT_CREDENTIALS_JSON: ${{ secrets.YT_CREDENTIALS_JSON_BIOHACKER }}
          YT_CHANNEL_ID:       ${{ secrets.YT_CHANNEL_ID_BIOHACKER }}
          TTS_VOICE:           en-US-ChristopherNeural
          TTS_RATE:            "+5%"
          OUTPUT_DIR:          ./output/biohacker/long
          TOPICS_FILE:         biohacker_topics.json
        run: |
          TOPIC="${AUTO_TOPIC:-${{ github.event.inputs.topic }}}"
          python pipeline.py --topic "$TOPIC" --niche "health"

      - name: Short
        if: ${{ github.event.inputs.upload_short != 'false' }}
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          YT_CREDENTIALS_JSON: ${{ secrets.YT_CREDENTIALS_JSON_BIOHACKER }}
          YT_CHANNEL_ID:       ${{ secrets.YT_CHANNEL_ID_BIOHACKER }}
          TTS_RATE:            "+10%"
          OUTPUT_DIR:          ./output/biohacker/shorts
          TOPICS_FILE:         biohacker_topics.json
        run: |
          TOPIC="${AUTO_TOPIC:-${{ github.event.inputs.topic }}}"
          python shorts_pipeline.py --topic "$TOPIC" --niche "health"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biohacker-${{ github.run_id }}
          path: output/biohacker/**/*.mp4
          retention-days: 3
