name: Kids Hindi Stories — Auto Upload
on:
  workflow_dispatch:
    inputs:
      topic:        {description: "Topic (blank=auto)", required: false, type: string}
      niche:        {description: "Niche", required: false, default: "kids", type: string}
      upload_short: {description: "Upload Short?", required: false, default: "true", type: string}
  schedule:
    - cron: "0 4 * * 1,3,5"   # Mon/Wed/Fri 9:30AM IST

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: "pip"}
      - run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt

      - name: Auto-update kids topics
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOPICS_FILE: kids_topics.json
        run: python update_topics.py --niche "kids" --count 10

      - name: Commit topics
        env: {GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}
        run: |
          git config --global user.email "bot@ytautopilot.com"
          git config --global user.name "YTAutoPilot Bot"
          git add kids_topics.json || true
          git diff --staged --quiet || git commit -m "auto: kids topics $(date +%F)"
          git push || true

      - name: Long video
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          YT_CREDENTIALS_JSON: ${{ secrets.YT_CREDENTIALS_JSON_KIDS }}
          YT_CHANNEL_ID:       ${{ secrets.YT_CHANNEL_ID_KIDS }}
          TTS_VOICE:           en-IN-NeerjaNeural
          TTS_RATE:            "+0%"
          OUTPUT_DIR:          ./output/kids/long
          TOPICS_FILE:         kids_topics.json
        run: |
          TOPIC="${AUTO_TOPIC:-${{ github.event.inputs.topic }}}"
          python pipeline.py --topic "$TOPIC" --niche "kids"

      - name: Short
        if: ${{ github.event.inputs.upload_short != 'false' }}
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          YT_CREDENTIALS_JSON: ${{ secrets.YT_CREDENTIALS_JSON_KIDS }}
          YT_CHANNEL_ID:       ${{ secrets.YT_CHANNEL_ID_KIDS }}
          TTS_RATE:            "+5%"
          OUTPUT_DIR:          ./output/kids/shorts
          TOPICS_FILE:         kids_topics.json
        run: |
          TOPIC="${AUTO_TOPIC:-${{ github.event.inputs.topic }}}"
          python shorts_pipeline.py --topic "$TOPIC" --niche "kids"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kids-${{ github.run_id }}
          path: output/kids/**/*.mp4
          retention-days: 3
